services:
  - type: web
    name: lamericana-erp-cloud
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AGENT_TOKEN
        generateValue: true
      - key: APP_TIMEZONE
        value: America/Santiago
      - key: DATABASE_URL
        fromDatabase:
          name: lamericana-erp-db
          property: connectionString

databases:
  - name: lamericana-erp-db
    plan: basic-256mb
