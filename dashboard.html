{% extends "base.html" %}
{% block content %}
<div class="login-card">
  <h1>Ingreso LA ERP Cloud</h1>
  <p class="muted">Módulo de producción y etiquetas para La Americana.</p>
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="form-grid single">
    <label>Usuario
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>Clave
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <label>Terminal
      <select name="terminal">
        {% for t in terminals %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
      </select>
    </label>
    <button class="primary" type="submit">Entrar</button>
  </form>
  <p class="hint">Usuario inicial: gustavo · clave inicial: 1176. Cámbiala cuando dejemos el módulo de usuarios completo.</p>
</div>
{% endblock %}
